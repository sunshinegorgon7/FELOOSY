<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FELOOSY — App Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  body { margin:0; font-family:'Geist',sans-serif; background:#1a1a1a; }

  /* ── Default / fallback tokens (dark) ───────────────────────────────────── */
  :root {
    --c-bg:            #0d2818;
    --c-surface:       #143a23;
    --c-surface-2:     #1c4a2e;
    --c-text:          #f6f1e3;
    --c-muted:         #7fa890;
    --c-muted-2:       #5a7d6a;
    --c-amber:         #f5a623;
    --c-amber-2:       #e08a10;
    --c-amber-tint:    rgba(245,166,35,0.12);
    --c-amber-soft:    rgba(245,166,35,0.08);
    --c-border:        rgba(246,241,227,0.08);
    --c-border-soft:   rgba(246,241,227,0.06);
    --c-border-strong: rgba(246,241,227,0.10);
    --c-placeholder:   rgba(246,241,227,0.40);
    --c-tile:          rgba(20,58,35,0.50);
    --c-shadow:        0 0 0 1px rgba(245,166,35,0.08), 0 30px 80px rgba(0,0,0,0.5);
    --c-fab-ring:      rgba(13,40,24,0.6);
    --c-fab-glow:      rgba(245,166,35,0.35);
  }

  /* ── DARK theme (unchanged) ─────────────────────────────────────────────── */
  [data-theme="dark"] {
    --c-bg:            #0d2818;
    --c-surface:       #143a23;
    --c-surface-2:     #1c4a2e;
    --c-text:          #f6f1e3;
    --c-muted:         #7fa890;
    --c-muted-2:       #5a7d6a;
    --c-amber:         #f5a623;
    --c-amber-2:       #e08a10;
    --c-amber-tint:    rgba(245,166,35,0.12);
    --c-amber-soft:    rgba(245,166,35,0.08);
    --c-border:        rgba(246,241,227,0.08);
    --c-border-soft:   rgba(246,241,227,0.06);
    --c-border-strong: rgba(246,241,227,0.10);
    --c-placeholder:   rgba(246,241,227,0.40);
    --c-tile:          rgba(20,58,35,0.50);
    --c-shadow:        0 0 0 1px rgba(245,166,35,0.08), 0 30px 80px rgba(0,0,0,0.5);
    --c-fab-ring:      rgba(13,40,24,0.6);
    --c-fab-glow:      rgba(245,166,35,0.35);
  }

  /* ── LIGHT theme — warm cream paper ────────────────────────────────────── */
  /*
     Design intent: cream card surfaces lifted off warm sand bg.
     Deep forest ink (#0d2818) as primary text.
     Deep amber (#a85f08) — 4.5:1 on cream, reads as warm caramel-amber.
     All borders/tiles use forest-ink alpha so they scale correctly.
  */
  [data-theme="light"] {
    --c-bg:            #ece2c5;   /* warm sand page canvas          */
    --c-surface:       #faf6ea;   /* cream paper cards — visibly lifted */
    --c-surface-2:     #e0d8be;   /* pressed / hover fill           */
    --c-text:          #0d2818;   /* deep forest ink                */
    --c-muted:         #4e7060;   /* sage green — AA on cream       */
    --c-muted-2:       #7c7860;   /* warm gray tertiary             */
    --c-amber:         #a85f08;   /* deep amber — 4.5:1 on cream    */
    --c-amber-2:       #844808;
    --c-amber-tint:    rgba(168,95,8,0.14);
    --c-amber-soft:    rgba(168,95,8,0.10);
    --c-border:        rgba(13,40,24,0.12);
    --c-border-soft:   rgba(13,40,24,0.07);
    --c-border-strong: rgba(13,40,24,0.20);
    --c-placeholder:   rgba(13,40,24,0.38);
    --c-tile:          rgba(13,40,24,0.07); /* enough body to see tiles     */
    --c-shadow:        0 0 0 1px rgba(13,40,24,0.08), 0 20px 50px rgba(13,40,24,0.16);
    --c-fab-ring:      rgba(13,40,24,0.12);
    --c-fab-glow:      rgba(168,95,8,0.28); /* amber-tinted glow on light   */
  }

  .feloosy { font-family:'Geist',sans-serif; color:var(--c-text); }
  .mono    { font-family:'DM Mono',monospace; }
  .caps    { font-size:11px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase; color:var(--c-muted); }

  /* Phone shell */
  .phone {
    width: 393px; height: 852px;
    background: var(--c-bg);
    border-radius: 44px;
    padding: 12px 0 0;
    overflow: hidden;
    box-shadow: var(--c-shadow);
    position: relative;
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 44px; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--c-text); font-family:'DM Mono',monospace; font-size: 14px;
    flex-shrink: 0;
  }
  /* Uses var(--c-text) so it's cream-on-dark in dark, ink-on-cream in light */
  .home-indicator {
    position:absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px;
    background: var(--c-text);
    opacity: 0.28;
  }

  .top-bar {
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .logo {
    font-family:'Geist',sans-serif; font-weight:700;
    font-size: 18px; letter-spacing: 0.10em; color: var(--c-text);
  }
  .pocket-pill {
    display:flex; align-items:center; gap:6px;
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px; color: var(--c-text);
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 12px;
    background: transparent;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer; color: var(--c-muted);
  }
  .icon-btn:hover { color: var(--c-text); }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-row { display:flex; gap:2px; }

  .scroll { overflow-y: auto; flex: 1; }
  .scroll::-webkit-scrollbar { display: none; }

  /* FAB — glow uses --c-fab-glow so it's amber in dark, caramel in light */
  .fab {
    position: absolute;
    bottom: 26px; left: 50%; transform: translateX(-50%);
    width: 64px; height: 64px;
    border-radius: 22px;
    background: var(--c-amber);
    color: var(--c-bg);
    display:flex; align-items:center; justify-content:center;
    font-size: 32px; font-weight: 300;
    box-shadow: 0 12px 28px var(--c-fab-glow), 0 0 0 4px var(--c-fab-ring);
    cursor: pointer; z-index: 5;
    line-height: 1;
  }
  .fab:active { transform: translateX(-50%) scale(0.94); }

  /* Home — month nav */
  .month-nav {
    display:flex; align-items:center; justify-content:center;
    gap: 24px; padding: 4px 0 12px;
    flex-shrink: 0;
  }
  .month-nav button {
    background: transparent; border:none; cursor:pointer;
    width: 28px; height: 28px; color: var(--c-muted);
    display:flex; align-items:center; justify-content:center;
  }
  .month-name { font-size: 14px; color: var(--c-text); font-weight: 500; }

  /* Hero remaining */
  .hero {
    padding: 0 20px 16px;
    flex-shrink: 0;
  }
  .hero-amount {
    font-family:'Geist',sans-serif;
    font-size: 44px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--c-amber);
    line-height: 1.1;
  }
  .hero-amount .unit { font-size: 22px; color: var(--c-amber); opacity: 0.85; margin-left: 4px; }
  .hero-sub { font-size: 13px; color: var(--c-muted); margin-top: 4px; }
  .hero-progress {
    height: 4px; border-radius: 2px;
    background: var(--c-border);
    overflow: hidden; margin-top: 14px;
    display: flex;
  }
  .hero-progress-fill {
    background: var(--c-amber);
    height: 100%; border-radius: 2px;
  }
  .hero-progress-rest { flex: 1; }

  /* Top spending */
  .top-spending {
    padding: 8px 16px 0;
  }
  .ts-label { padding: 0 4px 8px; }
  .ts-bars {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    align-items: end;
    height: 130px;
  }
  .ts-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    height: 100%;
    justify-content: flex-end;
  }
  .ts-amount { font-family:'DM Mono',monospace; font-size: 10px; color: var(--c-muted); }
  .ts-bar-wrap { flex: 1; width: 100%; display:flex; align-items:flex-end; }
  .ts-bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .ts-name { font-size: 10px; color: var(--c-muted); font-weight: 500; }

  /* Transaction list */
  .tx-section { padding: 16px 16px 0; }
  .tx-row {
    display:flex; align-items:center; gap: 12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--c-border);
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-day { flex: 1; }
  .tx-day-name { font-size: 14px; color: var(--c-text); font-weight: 500; }
  .tx-day-meta { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
  .tx-count {
    width: 22px; height: 22px; border-radius: 11px;
    background: var(--c-amber-tint); color: var(--c-amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .tx-amount { font-family:'DM Mono',monospace; font-size: 14px; color: var(--c-amber); font-weight: 500; }

  /* Budget page */
  .page-head {
    padding: 8px 16px 16px;
    display:flex; align-items:center; gap: 14px;
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 12px;
    background: transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color: var(--c-text);
  }
  .page-title { font-size: 22px; font-weight: 700; color: var(--c-text); letter-spacing: -0.01em; }

  .budget-card {
    margin: 0 16px 16px;
    background: var(--c-surface);
    border: 1px solid var(--c-border-soft);
    border-radius: 20px;
    padding: 20px;
  }
  .budget-card-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
  }
  .period-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--c-amber-tint);
    color: var(--c-amber);
    display:flex; align-items:center; justify-content:center;
  }
  .period-icon svg { width: 16px; height: 16px; }

  /* change-btn border now uses var(--c-amber) instead of hardcoded dark amber */
  .change-btn {
    border: 1px solid var(--c-amber);
    color: var(--c-amber); background: transparent;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Geist', sans-serif;
  }
  .change-btn:hover { background: var(--c-amber-soft); }

  /* Transaction screen */
  .new-tx-head {
    padding: 14px 16px 12px;
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .new-tx-title {
    font-size: 20px; font-weight: 600; color: var(--c-text);
  }
  .type-toggle {
    display: flex; gap: 8px;
    padding: 0 16px 12px;
    flex-shrink: 0;
  }
  .type-pill {
    padding: 9px 22px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    border: 1px solid var(--c-border-strong);
    background: transparent;
    color: var(--c-muted);
    cursor: pointer;
    font-family: 'Geist', sans-serif;
  }
  .type-pill.active.exp {
    border-color: var(--c-amber); color: var(--c-amber);
    background: var(--c-amber-soft);
  }
  .type-pill.active.inc {
    border-color: #4ade80; color: #4ade80;
    background: rgba(74,222,128,0.08);
  }
  .today-pill {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    color: var(--c-text);
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    margin-left: auto;
  }

  .amount-row {
    padding: 24px 24px 18px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .amount-currency {
    font-size: 14px; font-weight: 700; color: var(--c-amber);
    letter-spacing: 0.08em;
  }
  .amount-display {
    font-family: 'DM Mono', monospace;
    font-size: 56px; font-weight: 400;
    color: var(--c-placeholder);
    letter-spacing: -0.02em;
    display: flex; align-items: center;
  }
  .amount-cursor {
    width: 2px; height: 56px;
    background: var(--c-amber); border-radius: 1px;
    margin-left: 1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .desc-row {
    margin: 0 16px 16px;
    background: var(--c-surface);
    border: 1px solid var(--c-border-soft);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .desc-input {
    background: none; border: none; outline: none;
    color: var(--c-text);
    font-family: 'Geist', sans-serif;
    font-size: 14px; flex: 1;
  }
  .desc-input::placeholder { color: var(--c-muted); }

  .cat-section { padding: 0 16px; }
  .cat-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0 4px;
  }
  .cat-help {
    font-size: 12px; color: var(--c-muted); font-style: italic;
    margin-bottom: 12px;
  }
  .cat-new {
    color: var(--c-amber); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 4px; cursor: pointer;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-tile {
    aspect-ratio: 1.05;
    border-radius: 14px;
    background: var(--c-tile);
    border: 1.5px solid var(--cat-border, var(--c-border));
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--c-text);
  }
  .cat-tile:active { transform: scale(0.96); }
  /* box-shadow uses var(--c-amber) — adapts to both themes automatically */
  .cat-tile.selected {
    background: var(--c-amber-tint);
    border-color: var(--c-amber);
    box-shadow: 0 0 0 1px var(--c-amber);
  }
  .cat-tile svg { width: 22px; height: 22px; color: var(--cat-color, #f5a623); }
  .cat-name { font-size: 12px; font-weight: 500; color: var(--c-text); }

  .label-frequent { padding: 14px 0 8px; color: var(--c-muted); font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; }

  /* Settings */
  .settings-head {
    padding: 16px 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .settings-section { padding: 18px 16px 0; }
  .settings-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 4px;
    border-top: 1px solid var(--c-border);
    cursor: pointer;
  }
  .settings-row:hover .settings-value { color: var(--c-text); }
  .settings-info { flex: 1; }
  .settings-row-label { font-size: 14px; font-weight: 500; color: var(--c-text); }
  .settings-row-sub { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
  .settings-value {
    font-size: 13px; color: var(--c-amber); font-weight: 500;
    font-family: 'DM Mono', monospace;
  }
  .settings-chevron { color: var(--c-muted-2); }
  .settings-chevron svg { width: 14px; height: 14px; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #f5a623, #e08a10);
    color: var(--c-bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }

  .signout-btn {
    color: var(--c-amber); font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 6px 12px; border-radius: 8px;
  }
  .signout-btn:hover { background: var(--c-amber-soft); }

  /* Bar-chart F mini icon */
  .icon-f {
    width: 22px; height: 22px;
    border-radius: 5px;
    overflow: hidden;
    background: var(--c-surface);
  }

</style>
</head>
<body>

function App() {
  const [theme, setTheme] = useState('dark');
  const stageBg = theme === 'light' ? STAGE_LIGHT : STAGE_DARK;
  return (
    <DesignCanvas title="FELOOSY — App Redesign" defaultZoom={0.55}>
      <DCSection id="screens" title="Main screens · current theme">
        <DCArtboard id="theme-toggle" label="Theme · toggle (click)" width={433} height={120}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',height:'100%',background:'#1a1a1a',padding:20}}>
            {['light','system','dark'].map(t => (
              <button key={t} onClick={()=>setTheme(t)}
                style={{flex:1,padding:'14px 0',borderRadius:12,border:'1px solid #333',
                  background: theme===t?'#f5a623':'#222',
                  color: theme===t?'#0d2818':'#aaa',
                  fontFamily:'Geist',fontWeight:700,fontSize:13,letterSpacing:'0.04em',
                  textTransform:'uppercase',cursor:'pointer'}}>{t}</button>
            ))}
          </div>
        </DCArtboard>
        <DCArtboard id="home" label="Home" width={433} height={892}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',background:stageBg}}>
            <div data-theme={theme} style={{display:'contents'}}><HomeScreen/></div>
          </div>
        </DCArtboard>
        <DCArtboard id="budget" label="Budget" width={433} height={892}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',background:stageBg}}>
            <div data-theme={theme} style={{display:'contents'}}><BudgetScreen/></div>
          </div>
        </DCArtboard>
        <DCArtboard id="newtx" label="New Transaction" width={433} height={892}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',background:stageBg}}>
            <div data-theme={theme} style={{display:'contents'}}><NewTxScreen/></div>
          </div>
        </DCArtboard>
        <DCArtboard id="settings" label="Settings" width={433} height={892}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%',background:stageBg}}>
            <div data-theme={theme} style={{display:'contents'}}><SettingsScreen theme={theme} setTheme={setTheme}/></div>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
