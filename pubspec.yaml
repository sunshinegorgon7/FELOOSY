name: feloosy
description: Personal budget tracker — pocket money only.
publish_to: 'none'
version: 1.4.1+70

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.5

  # Navigation
  go_router: ^17.2.2

  # Immutable data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  crypto: ^3.0.0

  # UI
  cached_network_image: ^3.4.1
  lucide_icons: ^0.257.0
  fl_chart: ^1.2.0
  flutter_slidable: ^4.0.3
  gap: ^3.0.1
  google_fonts: ^8.0.2

  http: ^1.2.2

  # Auth + Google Drive backup
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

  # Home screen widget bridge
  home_widget: ^0.9.1

  # Local export / import
  share_plus: ^12.0.2
  file_picker: ^11.0.2

  # Monetization
  in_app_purchase: ^3.2.2
  flutter_secure_storage: ^10.2.0

  # SMS permission handling
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # App icon generation
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
