name: feloosy
description: Personal budget tracker — pocket money only.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.0

  # Immutable data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Home screen widget bridge
  home_widget: ^0.6.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # UI
  fl_chart: ^0.70.2
  flutter_slidable: ^3.1.1
  gap: ^3.0.1
  google_fonts: ^6.2.1
  package_info_plus: ^8.3.0

  # Firebase + auth
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^3.0.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
